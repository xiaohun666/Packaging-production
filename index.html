<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的导航</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f1117;
  --surface:#1a1d27;
  --surface2:#22263a;
  --border:#2d3149;
  --text:#e2e8f0;
  --muted:#8892b0;
  --accent:#6366f1;
  --accent2:#818cf8;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;min-height:100vh}
a{color:inherit;text-decoration:none}

/* Header */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px)}
.logo{font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:-0.5px;white-space:nowrap}
.logo span{color:var(--text)}
.search-wrap{flex:1;max-width:500px}
.search-wrap input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted)}
.header-actions{display:flex;gap:8px;margin-left:auto;align-items:center}
.btn{padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit}
.btn:hover{border-color:var(--accent);color:var(--accent2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:#4f46e5;color:#fff}
.btn.danger{border-color:#ef4444;color:#ef4444}
.btn.danger:hover{background:#ef4444;color:#fff}
.count-badge{background:var(--accent);color:#fff;font-size:11px;padding:2px 7px;border-radius:99px;margin-left:6px}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;overflow:hidden;flex-shrink:0;font-size:14px;cursor:pointer}
.avatar img{width:100%;height:100%;object-fit:cover}
.user-wrap{position:relative}
.user-menu{position:absolute;top:46px;right:0;background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:8px;min-width:250px;box-shadow:0 14px 44px rgba(0,0,0,.5);display:none;z-index:300}
.user-menu.open{display:block}
.user-menu .who{display:flex;align-items:center;gap:12px;padding:12px 10px;text-align:center;flex-direction:column}
.user-menu .who .big-av{width:56px;height:56px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:22px;overflow:hidden}
.user-menu .who .big-av img{width:100%;height:100%;object-fit:cover}
.user-menu .who .name{font-weight:600;font-size:15px;color:var(--text)}
.user-menu .who .mail{font-size:12px;color:var(--muted);word-break:break-all}
.user-menu .divider{height:1px;background:var(--border);margin:6px 4px}
.user-menu button{display:flex;align-items:center;gap:10px;width:100%;text-align:left;padding:11px 12px;border-radius:9px;font-size:14px;background:none;border:none;color:var(--text);cursor:pointer;font-family:inherit}
.user-menu button:hover{background:var(--surface2)}

/* Layout */
.layout{display:flex;min-height:calc(100vh - 60px)}

/* Sidebar */
aside{width:230px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:60px;max-height:calc(100vh - 60px)}
.sidebar-title{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:12px 16px 4px;font-weight:600}
.cat-item{display:flex;align-items:center;gap:8px;padding:8px 16px;cursor:pointer;transition:background .15s;font-size:14px;color:var(--muted);border-left:3px solid transparent}
.cat-item:hover{background:var(--surface2);color:var(--text)}
.cat-item.active{background:rgba(99,102,241,.1);color:var(--accent2);border-left-color:var(--accent)}
.cat-item.dragging{opacity:.4;background:var(--surface2)}
.cat-item.drag-over{border-top:2px solid var(--accent)}
.cat-drag-handle{cursor:grab;color:var(--muted);font-size:12px;opacity:0;transition:opacity .15s;flex-shrink:0;padding:0 2px;user-select:none}
.cat-item:hover .cat-drag-handle{opacity:1}
.cat-emoji{font-size:15px;width:20px;text-align:center;flex-shrink:0}
.cat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cat-count{font-size:11px;color:var(--muted);background:var(--surface2);padding:1px 6px;border-radius:99px}
.cat-item .cat-acts{display:none;gap:2px;margin-left:2px}
.cat-item:hover .cat-acts{display:flex}
.cat-act{width:18px;height:18px;border-radius:3px;background:transparent;border:none;color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:inherit}
.cat-act:hover{background:var(--surface2);color:var(--text)}
.cat-act.del:hover{color:#ef4444}
.sidebar-add{display:flex;align-items:center;gap:8px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;border-top:1px solid var(--border);margin-top:8px}
.sidebar-add:hover{color:var(--accent2)}
.sidebar-add span{font-size:16px;line-height:1}

/* Main */
main{flex:1;padding:24px;overflow:hidden}
.section{margin-bottom:28px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.section-title{font-size:18px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px}
.section-title .emoji{font-size:20px}

/* Grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;cursor:pointer;transition:all .15s;display:flex;align-items:flex-start;gap:10px;text-decoration:none;position:relative}
.card:hover{border-color:var(--accent);transform:translateY(-1px);background:var(--surface2)}
.card-icon{width:28px;height:28px;border-radius:6px;overflow:hidden;flex-shrink:0;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:13px}
.card-icon img{width:100%;height:100%;object-fit:cover}
.card-body{min-width:0;flex:1}
.card-title{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;word-break:break-all}
.card-url{font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px}
.card-actions{position:absolute;top:8px;right:8px;display:none;gap:4px}
.card:hover .card-actions{display:flex}
.card-btn{width:22px;height:22px;border-radius:4px;background:var(--surface);border:1px solid var(--border);color:var(--muted);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit}
.card-btn:hover{border-color:var(--accent);color:var(--accent2)}
.card-btn.del:hover{border-color:#ef4444;color:#ef4444}
.card.dragging{opacity:.4}
.card.drag-over{border-left:3px solid var(--accent)}
.card-drag{position:absolute;left:6px;bottom:6px;color:var(--muted);font-size:11px;opacity:0;cursor:grab;user-select:none}
.card:hover .card-drag{opacity:.7}

/* 管理 / 批量模式 */
.batch-bar{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:16px;flex-wrap:wrap;position:sticky;top:60px;z-index:10}
.batch-bar label{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text);cursor:pointer}
.batch-bar .sel-count{color:var(--muted);font-size:13px}
.batch-bar select{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.batch-spacer{margin-left:auto}
.rows{display:flex;flex-direction:column;gap:6px}
.row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:9px 12px;cursor:pointer;transition:all .12s}
.row:hover{border-color:var(--accent);background:var(--surface2)}
.row.sel{border-color:var(--accent);background:rgba(99,102,241,.10)}
.row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;cursor:pointer}
.row .card-icon{width:22px;height:22px}
.row-title{font-size:13px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;max-width:300px}
.row-url{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.row-del{width:24px;height:24px;border-radius:6px;background:transparent;border:none;color:var(--muted);font-size:15px;cursor:pointer;flex-shrink:0;font-family:inherit}
.row-del:hover{color:#ef4444}
@media(max-width:768px){.row-url{display:none}.row-title{max-width:none;flex:1}}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-icon{font-size:48px;margin-bottom:16px}

/* Modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;padding:24px;position:relative}
.modal h3{font-size:18px;font-weight:600;margin-bottom:20px;color:var(--text)}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px}
.form-group input,.form-group select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.form-group select option{background:var(--surface2)}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;line-height:1;padding:4px}
.modal-close:hover{color:var(--text)}
.color-swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent}
.color-swatch:hover{transform:scale(1.1)}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:10px 18px;border-radius:8px;font-size:14px;z-index:300;transform:translateY(60px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{background:#ef4444}

/* Login screen */
.login-screen{position:fixed;inset:0;background:radial-gradient(1000px 500px at 80% -10%,#1b2030 0%,var(--bg) 60%);z-index:1000;display:flex;align-items:center;justify-content:center;padding:24px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:44px;margin-bottom:12px}
.login-box h2{font-size:22px;font-weight:700;margin-bottom:6px}
.login-box .sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.btn-google{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:#1f2330;font-weight:600;font-size:15px;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:transform .08s ease,box-shadow .2s ease;font-family:inherit}
.btn-google:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.btn-oauth{width:100%;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;color:#1f2330;font-weight:600;font-size:15px;padding:13px;border-radius:10px;border:none;cursor:pointer;transition:transform .08s ease,box-shadow .2s ease;font-family:inherit;margin-bottom:10px}
.btn-oauth:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.3)}
.login-divider{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:12px;margin:16px 0}
.login-divider::before,.login-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.login-email{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:13px 14px;color:var(--text);font-size:14px;outline:none;margin-bottom:10px;font-family:inherit}
.login-email:focus{border-color:var(--accent)}
.login-email::placeholder{color:var(--muted)}
.btn-email{width:100%;background:var(--accent);color:#fff;font-weight:600;font-size:15px;padding:13px;border-radius:10px;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
.btn-email:hover{background:#4f46e5}
.btn-email:disabled{opacity:.6;cursor:default}
.login-mail-link{width:100%;margin-top:12px;background:transparent;border:1px solid var(--border);border-radius:10px;padding:10px;color:var(--muted);font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s}
.login-mail-link:hover{border-color:var(--accent);color:var(--accent2)}
.login-foot{margin-top:22px;font-size:12px;color:var(--muted);line-height:1.6}

/* Boot */
.boot{position:fixed;inset:0;display:grid;place-items:center;background:var(--bg);z-index:1100}
.spinner{width:34px;height:34px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 触摸设备：拖拽手柄常显，方便手指拖动排序 */
@media (hover: none){
  .cat-drag-handle{opacity:.55}
  .card .card-drag{opacity:.55}
}

/* Responsive */
@media(max-width:768px){
  aside{width:64px}
  .cat-name,.sidebar-title,.cat-count,.cat-acts,.sidebar-add span+*{display:none}
  .sidebar-add{justify-content:center}
  .logo span{display:none}
  .header-actions .label{display:none}
  .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
</style>
</head>
<body>

<!-- 加载中 -->
<div class="boot" id="bootView"><div class="spinner"></div></div>

<!-- 登录页 -->
<div class="login-screen" id="loginView" style="display:none">
  <div class="login-box">
    <div class="login-logo">⚡</div>
    <h2>我的导航</h2>
    <p class="sub">登录或注册以继续</p>
    <button id="googleLoginBtn" class="btn-oauth">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      使用 Google
    </button>
    <div class="login-divider">或</div>
    <input type="email" id="emailInput" class="login-email" placeholder="电子邮箱" autocomplete="email" />
    <input type="password" id="pwdInput" class="login-email" placeholder="密码（至少 6 位）" autocomplete="current-password" />
    <button id="emailLoginBtn" class="btn-email">登录</button>
    <div class="login-switch" style="margin-top:12px;font-size:13px;color:var(--muted);display:flex;justify-content:space-between;gap:10px">
      <a id="registerLink" style="color:var(--accent2);cursor:pointer">注册新账号</a>
      <a id="forgotLink" style="color:var(--muted);cursor:pointer">忘记密码？</a>
    </div>
    <button id="openMailBtn" class="login-mail-link" type="button">📮 打开邮箱（收注册/重置邮件）</button>
    <div id="emailMsg" style="font-size:12px;color:var(--accent2);min-height:16px;margin-top:10px;line-height:1.5"></div>
    <div class="login-foot">继续即表示你同意服务条款与隐私政策。<br/>书签数据安全存储在你的云数据库中。</div>
  </div>
</div>

<!-- 主应用 -->
<div id="appView" style="display:none">
  <header>
    <div class="logo">⚡<span>我的导航</span></div>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="搜索书签... (Ctrl+K)" autocomplete="off" />
    </div>
    <div class="header-actions">
      <button class="btn primary" id="addBtn">＋ <span class="label">添加书签</span></button>
      <button class="btn" id="manageBtn" title="批量管理">⚙ <span class="label">管理</span></button>
      <button class="btn" id="exportBtn" title="导出 JSON 备份">↓ <span class="label">导出</span></button>
      <button class="btn" id="importBtn" title="导入书签 (HTML / JSON)">↑ <span class="label">导入</span></button>
      <div class="user-wrap">
        <span class="avatar" id="avatar" title="账号">U</span>
        <div class="user-menu" id="userMenu">
          <div class="who">
            <span class="big-av" id="menuAv">U</span>
            <div class="name" id="menuName">—</div>
            <div class="mail" id="menuMail">—</div>
          </div>
          <div class="divider"></div>
          <button id="privateBtn">🔒 私密空间</button>
          <button id="switchBtn">🔄 切换账号</button>
          <button id="logoutBtn">🚪 退出登录</button>
        </div>
      </div>
    </div>
  </header>

  <div class="layout">
    <aside id="sidebar"></aside>
    <main id="main"></main>
  </div>
</div>

<!-- 书签弹窗 -->
<div class="modal-overlay" id="bmOverlay">
  <div class="modal">
    <button class="modal-close" data-close>×</button>
    <h3 id="bmModalTitle">添加书签</h3>
    <input type="hidden" id="bmId" />
    <div class="form-group"><label>网站标题 *</label><input type="text" id="bmTitle" placeholder="网站名称" /></div>
    <div class="form-group"><label>网址 *</label><input type="text" id="bmUrl" placeholder="https://..." /></div>
    <div class="form-group"><label>分类</label><select id="bmCategory"></select></div>
    <div class="form-group"><label>描述（可选）</label><input type="text" id="bmDesc" placeholder="备注…" /></div>
    <div class="form-group" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="bmPrivate" style="width:auto;accent-color:var(--accent)" /><label for="bmPrivate" style="margin:0;cursor:pointer;color:var(--text)">🔒 设为私密书签（需进入私密空间才显示）</label></div>
    <div class="modal-actions">
      <button class="btn" data-close>取消</button>
      <button class="btn primary" id="bmSave">保存</button>
    </div>
  </div>
</div>

<!-- 分类弹窗 -->
<div class="modal-overlay" id="catOverlay">
  <div class="modal">
    <button class="modal-close" data-close>×</button>
    <h3 id="catModalTitle">新建分类</h3>
    <input type="hidden" id="catId" />
    <div class="form-group"><label>分类名称 *</label><input type="text" id="catName" placeholder="例如：工作、学习、娱乐..." /></div>
    <div class="form-group"><label>图标（Emoji）</label><input type="text" id="catEmoji" placeholder="例如：📁" maxlength="4" /></div>
    <div class="form-group">
      <label>颜色</label>
      <div style="display:flex;gap:8px;align-items:center">
        <input type="color" id="catColor" value="#6366f1" style="width:44px;height:36px;padding:2px 4px;border-radius:6px;cursor:pointer" />
        <div id="colorPresets" style="display:flex;gap:6px;flex-wrap:wrap"></div>
      </div>
    </div>
    <div class="form-group" style="display:flex;align-items:center;gap:8px"><input type="checkbox" id="catPrivate" style="width:auto;accent-color:var(--accent)" /><label for="catPrivate" style="margin:0;cursor:pointer;color:var(--text)">🔒 设为私密分类（需进入私密空间才显示）</label></div>
    <div class="modal-actions">
      <button class="btn" data-close>取消</button>
      <button class="btn primary" id="catSave">保存</button>
    </div>
  </div>
</div>

<!-- 私密空间弹窗 -->
<div class="modal-overlay" id="privateOverlay">
  <div class="modal" style="max-width:360px;text-align:center">
    <button class="modal-close" data-close>×</button>

/* 触摸拖拽（手机端）：原生 HTML5 拖拽在触屏上不生效，这里用 touch 事件实现 */
function enableTouchSort(container, itemSel, handleSel, onReorder) {
  if (!container) return;
  let dragging = null, moved = false;
  container.querySelectorAll(itemSel).forEach(item => {
    const handle = handleSel ? item.querySelector(handleSel) : item;
    if (!handle) return;
    handle.addEventListener("touchstart", () => { dragging = item; moved = false; item.classList.add("dragging"); }, { passive: true });
  });
  container.addEventListener("touchmove", (e) => {
    if (!dragging) return;
    e.preventDefault();
    moved = true;
    const t = e.touches[0];
    const el = document.elementFromPoint(t.clientX, t.clientY);
    const over = el && el.closest(itemSel);
    if (over && over !== dragging && container.contains(over)) {
      const items = [...container.querySelectorAll(itemSel)];
      if (items.indexOf(dragging) < items.indexOf(over)) over.after(dragging); else over.before(dragging);
    }
  }, { passive: false });
  const end = async () => {
    if (!dragging) return;
    const el = dragging; dragging = null; el.classList.remove("dragging");
    if (moved) await onReorder([...container.querySelectorAll(itemSel)]);
  };
  container.addEventListener("touchend", end);
  container.addEventListener("touchcancel", end);
}

let dragSrc = null;
function initDragSort() {
  const list = $("#catList");
  if (!list) return;
  enableTouchSort(list, ".cat-item", ".cat-drag-handle", (els) => persistCatOrder(els.map(i => i.dataset.cat)));
  list.querySelectorAll(".cat-item").forEach(item => {
    item.addEventListener("dragstart", () => { dragSrc = item; item.classList.add("dragging"); });
    item.addEventListener("dragend", async () => {
      item.classList.remove("dragging");
      list.querySelectorAll(".cat-item").forEach(i => i.classList.remove("drag-over"));
      const orderedIds = [...list.querySelectorAll(".cat-item")].map(i => i.dataset.cat);
      await persistCatOrder(orderedIds);
    });
    item.addEventListener("dragover", (e) => {
      e.preventDefault();
      if (dragSrc && dragSrc !== item) {
        list.querySelectorAll(".cat-item").forEach(i => i.classList.remove("drag-over"));
        item.classList.add("drag-over");
      }
    });
    item.addEventListener("drop", (e) => {
      e.preventDefault();
      if (dragSrc && dragSrc !== item) {
        const items = [...list.querySelectorAll(".cat-item")];
        const s = items.indexOf(dragSrc), t = items.indexOf(item);
        if (s < t) item.after(dragSrc); else item.before(dragSrc);
        item.classList.remove("drag-over");
      }
    });
  });
}
async function persistCatOrder(orderedIds) {
  categories.sort((a, b) => orderedIds.indexOf(a.id) - orderedIds.indexOf(b.id));
  categories.forEach((c, i) => c.sort_order = i);
  const updates = orderedIds.map((id, i) => sb.from("categories").update({ sort_order: i }).eq("id", id));
  const results = await Promise.all(updates);
  if (results.some(r => r.error)) { toast("顺序保存失败", true); }
  else { toast("已保存新顺序"); }
}

/* 书签卡片拖动排序（在同一网格内，顺序保存到云端）*/
let cardDragSrc = null;
function initCardDragSort() {
  $$(".grid").forEach(grid => {
    enableTouchSort(grid, ".card", ".card-drag", (els) => persistCardOrder(els.map(c => c.dataset.id)));
    grid.querySelectorAll(".card").forEach(card => {
      card.addEventListener("dragstart", (e) => { cardDragSrc = card; card.classList.add("dragging"); e.dataTransfer.effectAllowed = "move"; });
      card.addEventListener("dragend", async () => {
        card.classList.remove("dragging");
        grid.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
        if (cardDragSrc && grid.contains(cardDragSrc)) {
          const ids = [...grid.querySelectorAll(".card")].map(c => c.dataset.id);
          await persistCardOrder(ids);
        }
        cardDragSrc = null;
      });
      card.addEventListener("dragover", (e) => {
        if (!cardDragSrc || !grid.contains(cardDragSrc) || cardDragSrc === card) return;
        e.preventDefault();
        grid.querySelectorAll(".card").forEach(c => c.classList.remove("drag-over"));
        card.classList.add("drag-over");
      });
      card.addEventListener("drop", (e) => {
        e.preventDefault();
        if (cardDragSrc && grid.contains(cardDragSrc) && cardDragSrc !== card) {
          const items = [...grid.querySelectorAll(".card")];
          const s = items.indexOf(cardDragSrc), t = items.indexOf(card);
          if (s < t) card.after(cardDragSrc); else card.before(cardDragSrc);
          card.classList.remove("drag-over");
        }
      });
    });
  });
}
async function persistCardOrder(ids) {
  ids.forEach((id, i) => { const b = bookmarks.find(x => x.id === id); if (b) b.sort_order = i; });
  const updates = ids.map((id, i) => sb.from("bookmarks").update({ sort_order: i }).eq("id", id));
  const res = await Promise.all(updates);
  if (res.some(r => r.error)) toast("顺序保存失败", true); else toast("已保存顺序");
}

// 浏览器导出的标准书签文件（Netscape HTML 格式）
function parseNetscape(htmlText) {
  const doc = new DOMParser().parseFromString(htmlText, "text/html");
  const items = [];
  doc.querySelectorAll("a[href]").forEach(a => {
    const url = a.getAttribute("href");
    if (!url || !/^https?:/i.test(url)) return;
    let cat = null, dl = a.closest("dl");
    while (dl) {
      const p = dl.parentElement;
      const h3 = p && p.tagName === "DT" ? p.querySelector(":scope > h3") : null;
      if (h3 && h3.textContent.trim()) { cat = h3.textContent.trim(); break; }
      dl = p ? p.closest("dl") : null;
    }
    items.push({ title: (a.textContent || "").trim() || url, url, description: null, category: cat });
  });
  return items;
}
// 本站导出的 JSON
function parseJsonBookmarks(text) {
  const data = JSON.parse(text);
  const arr = data.bookmarks || data;
  if (!Array.isArray(arr)) return [];
  const idToName = {};
  if (Array.isArray(data.categories)) data.categories.forEach(c => idToName[c.id] = c.name);
  return arr.map(b => ({
    title: b.title || b.name || "未命名",
    url: b.url || b.href || "",
    description: b.description || b.desc || null,
    category: b.category_name || b.category || idToName[b.category_id] || null,
  }));
}
// 旧版书签网站源码（数据藏在 INITIAL_DATA = [...] 里）
function parseLegacySite(text) {
  const idx = text.indexOf("INITIAL_DATA");
  if (idx < 0) return [];
  const start = text.indexOf("[", idx);
  if (start < 0) return [];
  let depth = 0, inStr = false, esc = false, end = -1;
  for (let i = start; i < text.length; i++) {
    const ch = text[i];
    if (inStr) {
      if (esc) esc = false;
      else if (ch === "\\") esc = true;
      else if (ch === '"') inStr = false;
    } else if (ch === '"') inStr = true;
    else if (ch === "[") depth++;
    else if (ch === "]") { depth--; if (depth === 0) { end = i; break; } }
  }
  if (end < 0) return [];
  let arr;
  try { arr = JSON.parse(text.slice(start, end + 1)); } catch { return []; }
  if (!Array.isArray(arr)) return [];
  return arr.map(b => ({
    title: b.t || b.title || b.name || "未命名",
    url: b.u || b.url || b.href || "",
    description: null,
    category: b.c || b.category || null,
  }));
}

async function importItems(items, forcedCatName) {
  const valid = items.filter(b => b.url);
  if (!valid.length) { toast("没有识别到书签", true); return; }
  const nameToId = {};
  categories.forEach(c => nameToId[c.name] = c.id);
  let forcedId = null;
  if (forcedCatName) {
    // 全部放进一个新分类
    const cfg = CAT_CONFIG[forcedCatName] || {};
    const { data: ins } = await sb.from("categories").insert({
      name: forcedCatName, icon: cfg.e || "📥", color: cfg.c || "#6366f1", user_id: currentUser.id, sort_order: categories.length
    }).select();
    if (ins && ins[0]) forcedId = ins[0].id;
  } else {
    // 按各自的文件夹建分类（套用已知图标/颜色）
    const newNames = [...new Set(valid.map(b => b.category).filter(Boolean).filter(n => !nameToId[n]))];
    let order = categories.length;
    for (const name of newNames) {
      const cfg = CAT_CONFIG[name] || {};
      const { data: ins } = await sb.from("categories").insert({
        name, icon: cfg.e || "📁", color: cfg.c || "#6366f1", user_id: currentUser.id, sort_order: order++
      }).select();
      if (ins && ins[0]) nameToId[name] = ins[0].id;
    }
  }
  // 去重（按网址）
  const norm = (u) => (u || "").replace(/\/+$/, "");
  const existing = new Set(bookmarks.map(b => norm(b.url)));
  const seen = new Set();
  const rows = [];
  for (const b of valid) {
    const key = norm(b.url);
    if (existing.has(key) || seen.has(key)) continue;
    seen.add(key);
    rows.push({
      title: b.title || b.url, url: b.url, description: b.description || null,
      category_id: forcedId ? forcedId : (b.category ? (nameToId[b.category] || null) : null), user_id: currentUser.id,
    });
  }
  if (!rows.length) { toast("这些书签已经全部存在啦"); return; }
  for (let i = 0; i < rows.length; i += 200) {
    const { error } = await sb.from("bookmarks").insert(rows.slice(i, i + 200));
    if (error) { toast("导入失败：" + error.message, true); return; }
  }
  const skipped = valid.length - rows.length;
  toast(`成功导入 ${rows.length} 个书签` + (skipped ? `（已跳过 ${skipped} 个重复）` : ""));
  loadData();
}

$("#importFile").onchange = async (e) => {
  const file = e.target.files[0]; if (!file) return;
  toast("正在解析文件…");
  try {
    const text = await file.text();
    let items = [];
    if (/INITIAL_DATA\s*=/.test(text)) { items = parseLegacySite(text); }
    else if (/\.json$/i.test(file.name) || /^\s*[\[{]/.test(text)) {
      try { items = parseJsonBookmarks(text); } catch { items = []; }
      if (!items.length) items = parseNetscape(text);
    } else {
      items = parseNetscape(text);
      if (!items.length) items = parseLegacySite(text);
    }
    // 始终按各自的文件夹/分类自动归类（无文件夹的归到“未分类”）
    await importItems(items, null);
  } catch (err) { toast("导入失败：文件无法解析", true); console.error(err); }
  e.target.value = "";
};

  el.style.cssText = "margin-top:14px;font-size:13px;color:var(--accent2);cursor:pointer;display:none";
  el.textContent = "忘记私密密码？用登录账号验证后重设";
  btn.after(el);
  el.onclick = onPrivateForgotClick;
  return el;
}
function openPrivateMode(mode){
  privateModalMode = mode;
  $("#privatePwd1").value = ""; $("#privatePwd2").value = ""; $("#privateErr").textContent = "";
  const forgot = ensurePrivateForgot();
  if (mode === "set") {
    $("#privateTitle").textContent = "设置私密密码";
    $("#privateDesc").textContent = "请设置一个进入密码（至少 4 位）";
    $("#privatePwd1").placeholder = "新密码";
    $("#privatePwd2Wrap").style.display = "";
    $("#privateConfirm").textContent = "确定";
    if (forgot) forgot.style.display = "none";
  } else if (mode === "reauth") {
    $("#privateTitle").textContent = "验证身份";
    $("#privateDesc").textContent = "请输入你的登录账号密码以重设私密密码";
    $("#privatePwd1").placeholder = "登录账号密码";
    $("#privatePwd2Wrap").style.display = "none";
    $("#privateConfirm").textContent = "验证";
    if (forgot) forgot.style.display = "none";
  } else {
    $("#privateTitle").textContent = "进入私密空间";
    $("#privateDesc").textContent = "输入密码以显示私密分类和书签";
    $("#privatePwd1").placeholder = "密码";
    $("#privatePwd2Wrap").style.display = "none";
    $("#privateConfirm").textContent = "确定";
    if (forgot) forgot.style.display = "block";
  }
  $("#privateOverlay").classList.add("open");
  setTimeout(() => $("#privatePwd1").focus(), 50);
}
async function onPrivateForgotClick(){
  if (accountHasPassword()) {
    openPrivateMode("reauth");
  } else {
    if (!confirm("你使用 Google 登录。点「确定」将用 Google 重新验证身份，随后可重设私密密码。")) return;
    sessionStorage.setItem("resetPrivateAfterAuth", "1");
    await googleSignIn();
  }
}
$("#privateBtn").onclick = async () => {
  $("#userMenu").classList.remove("open");
  if (privateUnlocked) { privateUnlocked = false; updatePrivateBtn(); loadData(); toast("已退出私密空间"); return; }
  await checkHasPrivatePwd();
  openPrivateMode(hasPrivatePwd ? "unlock" : "set");
};
ensurePrivateForgot();
if ($("#privateForgot")) $("#privateForgot").onclick = onPrivateForgotClick;
$("#privateConfirm").onclick = async () => {
  const p1 = $("#privatePwd1").value, err = $("#privateErr");
  const btn = $("#privateConfirm");
  if (privateModalMode === "set") {
    if (p1.length < 4) { err.textContent = "密码至少 4 位"; return; }
    if (p1 !== $("#privatePwd2").value) { err.textContent = "两次密码不一致"; return; }
    btn.disabled = true;
    const { error } = await sb.rpc("set_private_password", { pwd: p1 });
    btn.disabled = false;
    if (error) { err.textContent = "保存失败：" + error.message; return; }
    hasPrivatePwd = true;
    privateUnlocked = true; updatePrivateBtn(); closeOverlays(); loadData(); resetLockTimer(); toast("私密密码已设置");
  } else if (privateModalMode === "reauth") {
    if (!p1) { err.textContent = "请输入登录账号密码"; return; }
    btn.disabled = true;
    reauthInProgress = true;
    const { error } = await sb.auth.signInWithPassword({ email: currentUser.email, password: p1 });
    btn.disabled = false;
    if (error) { reauthInProgress = false; err.textContent = "账号密码错误，请重试"; $("#privatePwd1").select(); return; }
    setTimeout(() => { reauthInProgress = false; }, 4000);
    openPrivateMode("set");
    $("#privateDesc").textContent = "验证成功，请设置新的私密密码（至少 4 位）";
  } else {
    btn.disabled = true;
    const { data, error } = await sb.rpc("verify_private_password", { pwd: p1 });
    btn.disabled = false;
    if (error) { err.textContent = "验证失败：" + error.message; return; }
    if (data !== true) { err.textContent = "密码错误，请重试"; $("#privatePwd1").select(); return; }
    privateUnlocked = true; updatePrivateBtn(); closeOverlays(); loadData(); resetLockTimer(); toast("已进入私密空间");
  }
};
$("#privatePwd1").addEventListener("keydown", (e) => { if (e.key === "Enter") { if ($("#privatePwd2Wrap").style.display === "none") $("#privateConfirm").click(); else $("#privatePwd2").focus(); } });
$("#privatePwd2").addEventListener("keydown", (e) => { if (e.key === "Enter") $("#privateConfirm").click(); });
$("#searchInput").oninput = (e) => { searchTerm = e.target.value.trim(); renderMain(); };
function closeOverlays() { $$(".modal-overlay").forEach(o => o.classList.remove("open")); }
$$("[data-close]").forEach(b => b.onclick = closeOverlays);
$$(".modal-overlay").forEach(o => o.onclick = (e) => { if (e.target === o) closeOverlays(); });
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeOverlays();
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === "k") { e.preventDefault(); $("#searchInput") && $("#searchInput").focus(); }
});

// 颜色预设
$("#colorPresets").innerHTML = COLOR_PRESETS.map(c => `<span class="color-swatch" data-c="${c}" style="background:${c}"></span>`).join("");
$$("#colorPresets .color-swatch").forEach(s => s.onclick = () => { $("#catColor").value = s.dataset.c; });

/* ============ 启动 ============ */
initAuth();
</script>
</body>
</html>
